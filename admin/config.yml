backend:
  name: github
  repo: TakaBotDev/isekaitamere
  branch: main
  base_url: https://bounoverse-auth.takabotdev.workers.dev
  auth_endpoint: auth
  use_graphql: true

local_backend: true
publish_mode: simple

media_folder: "uploads"
public_folder: "/uploads"

collections:
  - name: "contenu"
    label: "Contenu du site"
    files:
      - name: "chapitres"
        label: "Histoire et chapitres"
        file: "chapters.json"
        format: "json"
        fields:
          - { label: "Titre de l'histoire", name: "storyTitle", widget: "string" }
          - { label: "Sous-titre", name: "storySubtitle", widget: "text" }
          - { label: "Introduction", name: "intro", widget: "text" }
          - label: "Chapitres"
            name: "chapters"
            label_singular: "Chapitre"
            widget: "list"
            summary: "Chapitre {{fields.number}} — {{fields.title}}"
            fields:
              - { label: "ID", name: "id", widget: "number", hint: "Exemple : 1, 2, 3…" }
              - { label: "Numéro", name: "number", widget: "number", hint: "Exemple : 1, 2, 3…" }
              - { label: "Titre", name: "title", widget: "string" }
              - { label: "Contenu", name: "content", widget: "text", hint: "Sépare les paragraphes avec une ligne vide." }
