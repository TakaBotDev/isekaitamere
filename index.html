<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Novelia — Le Royaume sous les Cendres</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <div class="container nav">
      <a href="#" class="logo" onclick="goHome(); return false;">
        <span class="logo-mark">✦</span>
        <span>Novelia</span>
      </a>

      <nav class="nav-links">
        <button class="link-button" type="button" onclick="goHomeAndScrollToChapters()">Chapitres</button>
      </nav>
    </div>
  </header>

  <main class="container main-shell">
    <section id="home-view" class="view">
      <div class="page-narrow">
        <section class="hero">
          <h1 id="story-title">Le Royaume sous les Cendres</h1>
          <p id="story-subtitle">
            Une histoire publiée chapitre par chapitre. Clique simplement sur un chapitre pour commencer la lecture.
          </p>

          <article class="hero-panel intro-box">
            <div class="reader-content no-padding">
              <p id="story-intro">
                Chargement…
              </p>
            </div>
          </article>
        </section>

        <section id="chapitres">
          <div class="section-head">
            <div>
              <h2>Chapitres</h2>
              <p id="chapters-count">Chargement des chapitres…</p>
            </div>
          </div>

          <div id="chapters-list" class="chapters-stack"></div>
          <p id="error-message" class="error-message hidden"></p>
        </section>
      </div>
    </section>

    <section id="chapter-view" class="view hidden">
      <div class="page-narrow">
        <div class="section-head">
          <div>
            <h2 id="chapter-story-title">Le Royaume sous les Cendres</h2>
            <p id="chapter-subtitle">Chapitre</p>
          </div>
          <button class="btn btn-secondary" type="button" onclick="goHome()">← Retour</button>
        </div>

        <article class="reader single-reader">
          <div class="reader-content" id="chapter-content"></div>
        </article>

        <div class="hero-actions top-gap">
          <button class="btn btn-secondary" type="button" onclick="goHomeAndScrollToChapters()">Retour aux chapitres</button>
        </div>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
